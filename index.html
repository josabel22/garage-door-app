  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2a44" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MG Portones" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>MG Portones | Gestion Operativa</title>
    <style>
      :root {
        --navy: #0f2a44;
        --blue: #1d4f7a;
        --steel: #64748b;
        --line: #d9e2ec;
        --bg: #f6f8fb;
        --white: #ffffff;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
        --shadow: 0 16px 40px rgba(15, 42, 68, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 268px 1fr;
      }

      .sidebar {
        background: var(--navy);
        color: var(--white);
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 88px;
        height: 44px;
        border-radius: 8px;
        background: #ffffff;
        display: block;
        object-fit: contain;
        padding: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
      }

      .brand p {
        margin: 2px 0 0;
        color: #bfd1df;
        font-size: 12px;
      }

      .nav {
        display: grid;
        gap: 8px;
        flex: 1;
        align-content: start;
      }

      .nav button,
      .logout {
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #d9e7f2;
        padding: 12px;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav button.active,
      .nav button:hover,
      .logout:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .main {
        padding: 22px;
        min-width: 0;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
      }

      .topbar h2 {
        margin: 0;
        font-size: 28px;
        color: var(--navy);
      }

      .topbar p {
        margin: 4px 0 0;
        color: var(--steel);
      }

      .status-pill,
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 7px 11px;
        background: #e8eef5;
        color: #244158;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ok);
      }

      .offline .dot {
        background: var(--warn);
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .panel,
      .card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .card {
        padding: 16px;
      }

      .stat-label {
        margin: 0;
        color: var(--steel);
        font-size: 13px;
      }

      .stat-value {
        margin: 8px 0 0;
        font-size: 30px;
        font-weight: 900;
        color: var(--navy);
      }

      .content-grid {
        grid-template-columns: 1.6fr 1fr;
        align-items: start;
      }

      .panel-header {
        padding: 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .panel-header h3 {
        margin: 0;
        color: var(--navy);
      }

      .panel-body {
        padding: 16px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        border: 0;
        border-radius: 8px;
        padding: 10px 13px;
        background: var(--blue);
        color: #fff;
        font-weight: 800;
      }

      .btn.secondary {
        background: #e8eef5;
        color: #17324a;
      }

      .btn.danger {
        background: var(--danger);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        padding: 13px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #50657a;
        font-size: 12px;
        text-transform: uppercase;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .report-drawer {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: var(--bg);
        overflow: auto;
      }

      .report-drawer header {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--navy);
        color: #fff;
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .report-drawer h3 {
        margin: 0;
        font-size: 20px;
      }

      .report-form {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .report-form .form-grid {
        grid-template-columns: 1fr;
      }

      .report-form input,
      .report-form select,
      .report-form textarea {
        min-height: 48px;
        font-size: 16px;
      }

      .report-form .btn {
        min-height: 52px;
        font-size: 16px;
      }

      .camera-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .lock-note {
        border: 1px solid #bdd7c7;
        border-radius: 8px;
        background: #eef8f2;
        color: #17623d;
        padding: 12px;
        font-weight: 800;
      }

      .history-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .client-suggestions {
        display: grid;
        gap: 6px;
        margin-top: 6px;
      }

      .client-suggestions button {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdff;
        color: #172033;
        padding: 10px;
      }

      .parts-picker {
        display: grid;
        gap: 10px;
      }

      .part-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfdff;
      }

      .part-row label {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #172033;
      }

      .part-row input[type="checkbox"] {
        width: auto;
      }

      .part-search-results {
        display: grid;
        gap: 8px;
        max-height: 220px;
        overflow: auto;
      }

      .part-result {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdff;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .selected-parts {
        display: grid;
        gap: 8px;
      }

      .mini-calendar {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        min-width: 170px;
        background: #fff;
      }

      .mini-calendar .month {
        background: var(--navy);
        color: #fff;
        padding: 7px 10px;
        font-weight: 900;
        text-align: center;
      }

      .mini-calendar .day {
        padding: 12px;
        text-align: center;
        font-size: 28px;
        font-weight: 900;
        color: var(--navy);
      }

      .autosave-note {
        color: #d7e7f5;
        font-weight: 800;
      }

      .photo-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 120px;
      }

      .photo-strip img {
        width: 58px;
        height: 58px;
        object-fit: cover;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #eef4f8;
      }

      .pdf-preview {
        background: #fff;
        color: #172033;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .pdf-preview h2,
      .pdf-preview h3 {
        color: var(--navy);
        margin: 0 0 8px;
      }

      .pdf-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .pdf-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfdff;
      }

      .pdf-photo-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .pdf-photo-grid img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(15, 42, 68, 0.42);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .modal {
        width: min(620px, 100%);
        max-height: calc(100vh - 32px);
        overflow: auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .modal.wide {
        width: min(980px, 100%);
      }

      .modal.fullscreen {
        width: min(1120px, 100%);
        min-height: calc(100vh - 32px);
      }

      .modal header {
        padding: 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .modal header h3 {
        margin: 0;
        color: var(--navy);
      }

      .modal-body {
        padding: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #42576b;
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 12px;
        background: #fff;
        color: #172033;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .full {
        grid-column: 1 / -1;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .list-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fbfdff;
      }

      .list-item strong {
        color: var(--navy);
      }

      .login {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
      }

      .login-hero {
        background: var(--navy);
        color: white;
        padding: 52px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .login-hero h1 {
        margin: 20px 0 14px;
        max-width: 680px;
        font-size: 48px;
        line-height: 1.05;
      }

      .login-hero p {
        max-width: 620px;
        color: #d5e2ed;
        font-size: 18px;
      }

      .login-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .login-card {
        width: min(440px, 100%);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 24px;
      }

      .login-card h2 {
        color: var(--navy);
        margin-top: 0;
      }

      .hidden {
        display: none !important;
      }

      .signature {
        height: 120px;
        border: 1px dashed #8aa0b5;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: repeating-linear-gradient(135deg, #f8fafc, #f8fafc 10px, #eef4f8 10px, #eef4f8 20px);
        color: #37536b;
        font-weight: 800;
      }

      .mobile-top {
        display: none;
        background: var(--navy);
        color: #fff;
        padding: 12px 16px;
        justify-content: space-between;
        align-items: center;
      }

      @media (max-width: 900px) {
        .shell,
        .login {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: fixed;
          inset: 0 auto 0 0;
          width: 286px;
          max-width: 86vw;
          height: 100dvh;
          z-index: 20;
          transform: translateX(-100%);
          transition: transform 0.2s ease;
        }

        body.menu-open .sidebar {
          transform: translateX(0);
        }

        .mobile-top {
          display: flex;
          position: sticky;
          top: 0;
          z-index: 10;
        }

        .main {
          padding: 16px;
        }

        .stats,
        .content-grid,
        .form-grid {
          grid-template-columns: 1fr;
        }

        .login-hero {
          padding: 34px 22px;
        }

        .login-hero h1 {
          font-size: 34px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .report-form {
          padding: 14px;
        }

        .camera-actions,
        .history-grid,
        .pdf-grid,
        .pdf-photo-grid {
          grid-template-columns: 1fr;
        }

        html,
        body {
          max-width: 100%;
          overflow-x: hidden;
        }

        .panel-header,
        .toolbar,
        .part-result,
        .part-row {
          align-items: stretch;
          flex-direction: column;
        }

        .toolbar .btn,
        .btn,
        .logout {
          min-height: 48px;
          width: 100%;
          justify-content: center;
        }

        .table-wrap {
          overflow-x: visible;
        }

        table {
          min-width: 0;
          border-collapse: separate;
          border-spacing: 0 12px;
        }

        thead {
          display: none;
        }

        tr {
          display: block;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fff;
          overflow: hidden;
        }

        td {
          display: grid;
          grid-template-columns: minmax(112px, 42%) minmax(0, 1fr);
          gap: 10px;
          border-bottom: 1px solid var(--line);
          padding: 11px;
          word-break: break-word;
        }

        td::before {
          content: attr(data-label);
          color: #50657a;
          font-size: 12px;
          font-weight: 900;
          text-transform: uppercase;
        }

        td:last-child {
          border-bottom: 0;
        }

        .modal,
        .modal.wide,
        .modal.fullscreen {
          width: 100%;
          max-height: calc(100vh - 16px);
        }

        .modal-backdrop {
          padding: 8px;
        }

        .photo-strip img {
          width: 70px;
          height: 70px;
        }
      }

      @media print {
        .sidebar,
        .mobile-top,
        .topbar,
        .toolbar,
        .no-print {
          display: none !important;
        }

        .shell {
          display: block;
        }

        .main {
          padding: 0;
        }

        .panel,
        .card {
          box-shadow: none;
          border-color: #999;
        }
      }
    </style>
  </head>

        clientes: 'Clientes',
        busqueda: 'Busqueda',
        usuarios: 'Usuarios',
        auditoria: 'Auditoria'
      };

      const retiredSeedUsernames = ['tecnico1', 'tecnico2', 'cliente1'];

      const state = {
        user: JSON.parse(localStorage.getItem('mg_user') || 'null'),
        data: JSON.parse(localStorage.getItem('mg_data') || 'null') || seed,
        view: 'dashboard',
        reportFormOpen: false,
        reportParts: [],
        modal: null
      };

      let cloudReady = false;
      let cloudError = '';
      let cloudSaveTimer = null;
      let cloudRetryTimer = null;
      let cloudSyncInFlight = false;
      const activePhotoUploads = new Map();
      function today(offset) {
        const date = new Date();
        date.setDate(date.getDate() + offset);
        return date.toISOString().slice(0, 10);
      }

      function save() {
        saveLocalData();
        queueCloudSave();
      }

      function saveLocalData() {
        try {
          localStorage.setItem('mg_data', JSON.stringify(state.data));
        } catch (error) {
          console.error(error);
          try {
            freeLocalStorageSpace();
            localStorage.setItem('mg_data', JSON.stringify(state.data));
            cloudError = 'Se libero espacio local. Sincroniza cuando tengas buena conexion.';
          } catch (retryError) {
            console.error(retryError);
            cloudError = 'No se pudo guardar la copia local. Hay fotos pendientes; sincroniza antes de cerrar la app.';
          }
        }
      }

      function backupLocalData(reason = 'auto') {
        try {
          const data = JSON.parse(localStorage.getItem('mg_data') || 'null');
          if (!data) return;
          const backups = JSON.parse(localStorage.getItem('mg_data_backups') || '[]');
          backups.unshift({
            reason,
            createdAt: new Date().toISOString(),
            jobs: (data.jobs || []).length,
            users: (data.users || []).length,
            data: backupSafeData(data)
          });
          localStorage.setItem('mg_data_backups', JSON.stringify(backups.slice(0, 3)));
        } catch (error) {
          console.error(error);
          localStorage.removeItem('mg_data_backups');
        }
      }

      function freeLocalStorageSpace() {
        localStorage.removeItem('mg_data_backups');
        clearReportDrafts();
        state.data.auditLogs = (state.data.auditLogs || []).slice(0, 80);
      }

      function backupSafeData(data) {
        const copy = cloudSafeData(data);
        copy.auditLogs = (copy.auditLogs || []).slice(0, 80);
        return copy;
      }

      function supabaseConfig() {
        const config = window.MG_SUPABASE_CONFIG || {};
        const url = String(config.url || '').replace(/\/$/, '');
        const anonKey = String(config.anonKey || '');
        const ready = url.startsWith('https://') && anonKey.startsWith('sb_') && !url.includes('PEGA_AQUI') && !anonKey.includes('PEGA_AQUI');
        return { url, anonKey, ready };
      }

      async function supabaseRequest(path, options = {}) {
        const config = supabaseConfig();
        if (!config.ready) throw new Error('Falta configurar Supabase.');
        const response = await fetch(`${config.url}/rest/v1/${path}`, {
          ...options,
          headers: {
            apikey: config.anonKey,
            Authorization: `Bearer ${config.anonKey}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation',
            ...(options.headers || {})
          }
        });
        if (!response.ok) {
          const details = await response.text();
          throw new Error(details || `Error Supabase ${response.status}`);
        }
        if (response.status === 204) return null;
        return response.json();
      }

      async function loadCloudData() {
        const config = supabaseConfig();
        if (!config.ready) {
          cloudError = 'Configura supabase-config.js para usar base central.';
          return;
        }

        try {
          backupLocalData('before_cloud_load');
          const rows = await supabaseRequest('app_state?select=data&id=eq.production');
          if (rows?.[0]?.data) {
            state.data = mergeCloudData(rows[0].data, state.data);
            state.data = recoverFromLocalBackups(state.data);
            saveLocalData();
            if ((state.data.syncQueue || []).length) queueCloudSave();
          } else {
            await saveCloudDataNow({ clearQueue: false });
          }
          cloudReady = true;
          cloudError = '';
        } catch (error) {
          cloudReady = false;
          cloudError = 'No se pudo conectar a Supabase. Revisa app_state_supabase.sql y las claves.';
          console.error(error);
        }
      }

      function mergeCloudData(cloudData, localData) {
        const merged = { ...cloudData };
        const localJobCount = (localData?.jobs || []).length;
        const cloudJobCount = (cloudData?.jobs || []).length;
        merged.deletedJobs = mergeDeletedJobs(cloudData?.deletedJobs, localData?.deletedJobs);
        merged.deletedPhotos = mergeDeletedPhotos(cloudData?.deletedPhotos, localData?.deletedPhotos);
        merged.jobs = mergeJobs(cloudData?.jobs, localData?.jobs, merged.deletedPhotos).filter((job) => !isDeletedJob(job, merged.deletedJobs));
        ['clients', 'warranties', 'movements', 'notifications', 'auditLogs', 'appointments', 'maintenances'].forEach((key) => {
          merged[key] = mergeById(cloudData?.[key], localData?.[key]);
        });
        merged.users = mergeUsers(cloudData?.users, localData?.users);
        merged.deletedUsers = mergeDeletedUsers(cloudData?.deletedUsers, localData?.deletedUsers);
        merged.vehicles = cloudData?.vehicles || localData?.vehicles || [];
        merged.inventory = mergeInventory(cloudData?.inventory, localData?.inventory);
        merged.syncQueue = localData.syncQueue || [];
        if ((localJobCount > cloudJobCount || (localData?.users || []).length > (cloudData?.users || []).length) && !merged.syncQueue.length) {
          merged.syncQueue = [{ id: Date.now(), type: 'recovery', createdAt: new Date().toISOString() }];
        }
        return merged;
      }

      function recoverFromLocalBackups(data) {
        let recovered = false;
        let backups = [];
        try {
          backups = JSON.parse(localStorage.getItem('mg_data_backups') || '[]');
        } catch (error) {
          backups = [];
        }
        backups.forEach((backup) => {
          const beforeJobs = (data.jobs || []).length;
          const beforeUsers = (data.users || []).length;
          data.deletedJobs = mergeDeletedJobs(data.deletedJobs, backup.data?.deletedJobs);
          data.deletedPhotos = mergeDeletedPhotos(data.deletedPhotos, backup.data?.deletedPhotos);
          data.jobs = mergeJobs(data.jobs, backup.data?.jobs, data.deletedPhotos).filter((job) => !isDeletedJob(job, data.deletedJobs));
          data.clients = mergeById(data.clients, backup.data?.clients);
          data.warranties = mergeById(data.warranties, backup.data?.warranties);
          data.movements = mergeById(data.movements, backup.data?.movements);
          data.notifications = mergeById(data.notifications, backup.data?.notifications);
          data.auditLogs = mergeById(data.auditLogs, backup.data?.auditLogs);
          data.users = mergeUsers(data.users, backup.data?.users);
          data.deletedUsers = mergeDeletedUsers(data.deletedUsers, backup.data?.deletedUsers);
          if ((data.jobs || []).length > beforeJobs || (data.users || []).length > beforeUsers) recovered = true;
        });
        if (recovered) {
          data.syncQueue ||= [];
          data.syncQueue.push({ id: Date.now(), type: 'backup_recovery', createdAt: new Date().toISOString() });
        }
        return data;
      }

      function mergeById(cloudItems = [], localItems = []) {
        const items = new Map();
        (cloudItems || []).forEach((item) => items.set(String(item.id), item));
        (localItems || []).forEach((item) => items.set(String(item.id), item));
        return Array.from(items.values());
      }

      function mergeJobs(cloudJobs = [], localJobs = [], deletedPhotos = []) {
        const items = new Map();
        (cloudJobs || []).forEach((job) => items.set(jobMergeKey(job), job));
        (localJobs || []).forEach((localJob) => {
          const key = jobMergeKey(localJob);
          const cloudJob = items.get(key);
          if (!cloudJob) {
            items.set(key, localJob);
            return;
          }
          const cloudUpdated = Date.parse(cloudJob.updatedAt || cloudJob.closedAt || '') || 0;
          const localUpdated = Date.parse(localJob.updatedAt || localJob.closedAt || '') || 0;
          const preferred = localUpdated > cloudUpdated ? localJob : cloudJob;
          items.set(key, {
            ...preferred,
            photos: mergeJobPhotos(cloudJob.photos, localJob.photos, deletedPhotos, preferred)
          });
        });
        return Array.from(items.values()).map((job) => ({
          ...job,
          photos: mergeJobPhotos({}, job.photos, deletedPhotos, job)
        }));
      }

      function jobMergeKey(job) {
        return String(job?.id || job?.ticket || '');
      }

      function mergeDeletedJobs(cloudDeleted = [], localDeleted = []) {
        const items = new Map();
        [...(cloudDeleted || []), ...(localDeleted || [])].forEach((item) => {
          const key = String(item?.id || item?.ticket || '');
          if (key) items.set(key, item);
        });
        return Array.from(items.values());
      }

      function mergeDeletedPhotos(cloudDeleted = [], localDeleted = []) {
        const items = new Map();
        [...(cloudDeleted || []), ...(localDeleted || [])].forEach((item) => {
          const key = deletedPhotoKey(item);
          if (key) items.set(key, item);
        });
        return Array.from(items.values());
      }

      function deletedPhotoKey(item) {
        return [
          String(item?.jobId || item?.ticket || ''),
          String(item?.kind || ''),
          String(item?.photoId || item?.path || item?.url || item?.key || item?.name || '')
        ].join('|');
      }

      function isDeletedJob(job, deletedJobs = state.data?.deletedJobs || []) {
        return (deletedJobs || []).some((deleted) => (
          String(deleted.id || '') === String(job?.id || '') ||
          String(deleted.ticket || '').toLowerCase() === String(job?.ticket || '').toLowerCase()
        ));
      }

      function mergeJobPhotos(cloudPhotos = {}, localPhotos = {}, deletedPhotos = [], job = {}) {
        return {
          before: mergePhotoList(cloudPhotos?.before, localPhotos?.before, deletedPhotos, job, 'before'),
          after: mergePhotoList(cloudPhotos?.after, localPhotos?.after, deletedPhotos, job, 'after')
        };
      }

      function mergePhotoList(cloudPhotos = [], localPhotos = [], deletedPhotos = [], job = {}, kind = '') {
        const items = new Map();
        [...(cloudPhotos || []), ...(localPhotos || [])].forEach((photo) => {
          if (!photo) return;
          if (isDeletedPhoto(photo, deletedPhotos, job, kind)) return;
          const key = photo.path || photo.url || photo.data || photo.name || JSON.stringify(photo);
          if (!items.has(key)) items.set(key, photo);
        });
        return Array.from(items.values());
      }

      function isDeletedPhoto(photo, deletedPhotos = [], job = {}, kind = '') {
        const jobKeys = [String(job?.id || ''), String(job?.ticket || '')].filter(Boolean);
        const photoKeys = [
          String(photo?.id || ''),
          String(photo?.path || ''),
          String(photo?.url || ''),
          String(photo?.name || ''),
          String(photo?.data || '')
        ].filter(Boolean);
        return (deletedPhotos || []).some((deleted) => {
          const deletedJob = String(deleted?.jobId || deleted?.ticket || '');
          const deletedKind = String(deleted?.kind || '');
          if (deletedKind && deletedKind !== kind) return false;
          if (deletedJob && jobKeys.length && !jobKeys.includes(deletedJob)) return false;
          return photoKeys.some((key) => (
            key === String(deleted?.photoId || '') ||
            key === String(deleted?.path || '') ||
            key === String(deleted?.url || '') ||
            key === String(deleted?.key || '') ||
            key === String(deleted?.name || '')
          ));
        });
      }

      function mergeUsers(cloudUsers = [], localUsers = []) {
        const items = new Map();
        (cloudUsers || []).forEach((user) => items.set(String(user.username || user.id), user));
        (localUsers || []).forEach((user) => {
          const key = String(user.username || user.id);
          if (!items.has(key) || user.createdAt || user.active === false) items.set(key, user);
        });
        return Array.from(items.values());
      }

      function mergeDeletedUsers(cloudDeleted = [], localDeleted = []) {
        const items = new Map();
        [...(cloudDeleted || []), ...(localDeleted || [])].forEach((item) => {
          const key = String(item?.username || item?.id || '');
          if (key) items.set(key, item);
        });
        return Array.from(items.values());
      }

      function mergeInventory(cloudItems = [], localItems = []) {
        const items = new Map();
        (cloudItems || []).forEach((item) => items.set(`${item.vehicle}|${item.part}`, item));
        (localItems || []).forEach((item) => {
          const key = `${item.vehicle}|${item.part}`;
          if (!items.has(key)) items.set(key, item);
        });
        return Array.from(items.values());
      }

      function queueCloudSave() {
        if (!supabaseConfig().ready) return;
        window.clearTimeout(cloudSaveTimer);
        cloudSaveTimer = window.setTimeout(() => {
          syncCloudInBackground();
        }, 600);
      }

      async function syncCloudInBackground() {
        if (cloudSyncInFlight || !navigator.onLine || !supabaseConfig().ready) {
          scheduleCloudRetry();
          return;
        }
        cloudSyncInFlight = true;
        try {
          await saveCloudDataNow({ clearQueue: true });
          window.clearTimeout(cloudRetryTimer);
          cloudRetryTimer = null;
        } catch (error) {
          cloudReady = false;
          cloudError = 'Cambios guardados localmente. Reintentando sincronizacion automaticamente.';
          console.error(error);
          scheduleCloudRetry();
        } finally {
          cloudSyncInFlight = false;
        }
      }

      function scheduleCloudRetry(delay = 15000) {
        if (!supabaseConfig().ready || cloudRetryTimer) return;
        cloudRetryTimer = window.setTimeout(() => {
          cloudRetryTimer = null;
          const hasPendingData = (state.data.syncQueue || []).length || countPendingPhotoUploads(state.data);
          if (hasPendingData) syncCloudInBackground();
        }, delay);
      }

      async function saveCloudDataNow(options = {}) {
        if (!supabaseConfig().ready) return;
        backupLocalData('before_cloud_save');
        await uploadPendingPhotos();
        saveLocalData();
        const rows = await supabaseRequest('app_state?select=data&id=eq.production');
        if (rows?.[0]?.data) {
          state.data = mergeBeforeCloudWrite(rows[0].data, state.data);
          saveLocalData();
        }
        const pendingPhotos = countPendingPhotoUploads(state.data);
        const cloudData = pendingPhotos ? cloudSafeData(state.data) : state.data;
        const shouldClearQueue = options.clearQueue && pendingPhotos === 0;
        const dataToSave = shouldClearQueue ? { ...cloudData, syncQueue: [] } : cloudData;
        await writeCloudState(dataToSave);
        if (shouldClearQueue) {
          state.data.syncQueue = [];
          saveLocalData();
        }
        const summary = pendingPhotoSummary(state.data);
        cloudReady = true;
        cloudError = pendingPhotos ? `Datos sincronizados; faltan ${pendingPhotos} foto(s). ${summary ? 'Boletas: ' + summary : 'Toca Sincronizar de nuevo.'}` : '';
      }

      async function writeCloudState(dataToSave) {
        const payload = {
          data: dataToSave,
          updated_at: new Date().toISOString()
        };
        const updated = await supabaseRequest('app_state?id=eq.production', {
          method: 'PATCH',
          body: JSON.stringify(payload)
        });
        if (Array.isArray(updated) && updated.length) return updated;
        return supabaseRequest('app_state?on_conflict=id', {
          method: 'POST',
          headers: { Prefer: 'resolution=merge-duplicates,return=representation' },
          body: JSON.stringify({ id: 'production', ...payload })
        });
      }

      function mergeBeforeCloudWrite(cloudData, localData) {
        const merged = { ...cloudData, ...localData };
        merged.deletedJobs = mergeDeletedJobs(cloudData?.deletedJobs, localData?.deletedJobs);
        merged.jobs = mergeJobs(cloudData?.jobs, localData?.jobs).filter((job) => !isDeletedJob(job, merged.deletedJobs));
        ['clients', 'warranties', 'movements', 'notifications', 'auditLogs', 'appointments', 'maintenances'].forEach((key) => {
          merged[key] = mergeById(cloudData?.[key], localData?.[key]);
        });
        merged.users = mergeUsers(cloudData?.users, localData?.users);
        merged.deletedUsers = mergeDeletedUsers(cloudData?.deletedUsers, localData?.deletedUsers);
        merged.vehicles = localData?.vehicles || cloudData?.vehicles || [];
        merged.inventory = mergeInventoryLocalWins(cloudData?.inventory, localData?.inventory);
        merged.syncQueue = localData?.syncQueue || [];
        return merged;
      }

      function mergeInventoryLocalWins(cloudItems = [], localItems = []) {
        const items = new Map();
        (cloudItems || []).forEach((item) => items.set(`${item.vehicle}|${item.part}`, item));
        (localItems || []).forEach((item) => items.set(`${item.vehicle}|${item.part}`, item));
        return Array.from(items.values());
      }

      function countPendingPhotoUploads(data) {
        return (data?.jobs || []).reduce((total, job) => {
          const before = (job.photos?.before || []).filter((photo) => photo?.data && !photo.url).length;
          const after = (job.photos?.after || []).filter((photo) => photo?.data && !photo.url).length;
          return total + before + after;
        }, 0);
      }

      function pendingPhotoSummary(data) {
        return (data?.jobs || [])
          .map((job) => {
            const before = (job.photos?.before || []).filter((photo) => photo?.data && !photo.url).length;
            const after = (job.photos?.after || []).filter((photo) => photo?.data && !photo.url).length;
            const total = before + after;
            return total ? `${job.ticket || job.id}: ${total}` : '';
          })
          .filter(Boolean)
          .slice(0, 5)
          .join(', ');
      }

      function cloudSafeData(data) {
        const copy = JSON.parse(JSON.stringify(data));
        (copy.jobs || []).forEach((job) => {
          ['before', 'after'].forEach((kind) => {
            job.photos ||= { before: [], after: [] };
            job.photos[kind] = (job.photos[kind] || []).map((photo) => {
              if (!photo?.data || photo.url) return photo;
              const { data: _data, ...rest } = photo;
              return { ...rest, pendingUpload: true };
            });
          });
        });
        copy.auditLogs = (copy.auditLogs || []).slice(0, 150);
        return copy;
      }

      function normalizeData() {
        state.data = sanitizeMojibake(state.data);
        state.data.users ||= users;
        state.data.vehicles ||= [
          { id: 1, code: 'MOV-01', name: 'Unidad Norte', plate: 'CL-1023', technicianId: 2, technician: 'Carlos Mendez', active: true, notes: 'Unidad principal para trabajos residenciales' },
          { id: 2, code: 'MOV-02', name: 'Unidad Oeste', plate: 'CL-2044', technicianId: null, technician: 'Sin asignar', active: true, notes: 'Disponible para asignacion' },
          { id: 3, code: 'MOV-03', name: 'Unidad Industrial', plate: 'CL-3310', technicianId: 4, technician: 'Luis Vega', active: true, notes: 'Herramientas para portones industriales' }
        ];
        state.data.maintenances ||= [];
        state.data.notifications ||= [];
        state.data.movements ||= [];
        state.data.auditLogs ||= [];
        state.data.deletedUsers ||= [];
        state.data.deletedJobs ||= [];
        state.data.deletedPhotos ||= [];
        state.data.jobs = (state.data.jobs || []).filter((job) => !isDeletedJob(job));
        state.data.users = state.data.users.map((user) => ({
          phone: '',
          email: '',
          active: true,
          createdAt: today(-30),
          ...user
        }));
        state.data.users = state.data.users.filter((user, index, list) => (
          index === list.findIndex((item) => item.username === user.username || item.id === user.id)
        ));
        state.data.users = state.data.users.filter((user) => !isDeletedUser(user));
        state.data.vehicles = state.data.vehicles.filter((vehicle, index, list) => (
          index === list.findIndex((item) => item.code === vehicle.code)
        ));
        state.data.vehicles = state.data.vehicles.map((vehicle) => {
          const assigned = state.data.users.filter((user) => user.role === 'technician' && user.vehicle === vehicle.code);
          return {
            ...vehicle,
            technicianIds: [...new Set([...(vehicle.technicianIds || []), ...assigned.map((user) => user.id)])]
          };
        });
        state.data.jobs = (state.data.jobs || []).map((job) => {
          const cleanJob = { ...job };
          delete cleanJob.cost;
          cleanJob.priority ||= 'Media';
          cleanJob.materials ||= '';
          cleanJob.notes ||= '';
          cleanJob.photos ||= { before: [], after: [] };
          cleanJob.photos.before = Array.isArray(cleanJob.photos.before) ? cleanJob.photos.before : [];
          cleanJob.photos.after = Array.isArray(cleanJob.photos.after) ? cleanJob.photos.after : [];
          cleanJob.workshopEntry ||= {};
          cleanJob.signed ||= false;
          cleanJob.pdfStatus ||= cleanJob.signed ? 'Generado' : 'Pendiente';
          cleanJob.gps ||= '';
          cleanJob.arrival ||= '';
          cleanJob.departure ||= '';
          cleanJob.motorCount ||= Number(cleanJob.motorBrands?.length || 0);
          cleanJob.motorBrands ||= [];
          return cleanJob;
        });
        state.data.inventory = (state.data.inventory || []).map((item, index) => {
          const currentId = String(item.id || '');
          const safeId = currentId && !/['"<>\s]/.test(currentId) ? currentId : `inv-${index}-${String(item.vehicle || 'movil').replace(/\W+/g, '-')}`;
          return {
            ...item,
            id: safeId
          };
        });
        state.data.warranties = (state.data.warranties || []).map((warranty, index) => ({
          id: warranty.id || index + 1,
          clientId: warranty.clientId || null,
          technicianId: warranty.technicianId || null,
          technician: warranty.technician || 'Sin asignar',
          vehicle: warranty.vehicle || '',
          approval: warranty.approval || (warranty.technicianId ? 'Aprobada' : 'Pendiente'),
          ...warranty
        }));
        updateWarrantyStatuses();
        updateMaintenanceNotifications();
        updateAppointmentNotifications();
        save();
      }

      function sanitizeMojibake(value) {
        if (Array.isArray(value)) return value.map(sanitizeMojibake);
        if (value && typeof value === 'object') {
          return Object.fromEntries(Object.entries(value).map(([key, item]) => [key, sanitizeMojibake(item)]));
        }
        if (typeof value !== 'string') return value;
        if (['NaN', 'undefined', 'null'].includes(value.trim())) return '';
        return value
          .replaceAll(String.fromCharCode(0x00c2, 0x00b7), ' - ')
          .replaceAll(String.fromCharCode(0x00e2, 0x2020, 0x2019), '->')
          .replaceAll(String.fromCharCode(0x00e2, 0x20ac, 0x201d), '-')
          .replaceAll(String.fromCharCode(0x00e2, 0x20ac, 0x0153), '"')
          .replaceAll(String.fromCharCode(0x00e2, 0x20ac, 0x009d), '"')
          .replaceAll(String.fromCharCode(0x00e2, 0x20ac, 0x02dc), "'")
          .replaceAll(String.fromCharCode(0x00e2, 0x20ac, 0x2122), "'");
      }

      function clearReportDrafts() {
        Object.keys(localStorage)
          .filter((key) => key.startsWith('mg_report_draft_'))
          .forEach((key) => localStorage.removeItem(key));
      }

      function queuePendingChange(type, id = Date.now()) {
        state.data.syncQueue ||= [];
        state.data.syncQueue.push({ id, type, createdAt: new Date().toISOString() });
      }

      function appUsers() {
        return (state.data.users || users).filter((user) => !isDeletedUser(user) && !isRetiredSeedUser(user));
      }

      function isRetiredSeedUser(user) {
        return retiredSeedUsernames.includes(String(user?.username || '').toLowerCase());
      }

      function isDeletedUser(user) {
        return (state.data.deletedUsers || []).some((deleted) => (
          String(deleted.id || '') === String(user?.id || '') ||
          String(deleted.username || '').toLowerCase() === String(user?.username || '').toLowerCase()
        ));
      }

      function rememberDeletedUser(user) {
        if (!user) return;
        state.data.deletedUsers ||= [];
        state.data.deletedUsers = mergeDeletedUsers(state.data.deletedUsers, [{
          id: user.id,
          username: user.username,
          name: user.name,
          role: user.role,
          deletedAt: new Date().toISOString()
        }]);
      }

      function rememberDeletedJob(job) {
        if (!job) return;
        state.data.deletedJobs ||= [];
        state.data.deletedJobs = mergeDeletedJobs(state.data.deletedJobs, [{
          id: job.id,
          ticket: job.ticket,
          client: job.client,
          date: job.date,
          deletedAt: new Date().toISOString(),
          deletedBy: state.user?.name || 'Sistema'
        }]);
      }

      function rememberDeletedPhoto(job, kind, photo) {
        if (!job || !photo) return;
        state.data.deletedPhotos ||= [];
        state.data.deletedPhotos = mergeDeletedPhotos(state.data.deletedPhotos, [{
          jobId: job.id,
          ticket: job.ticket,
          kind,
          photoId: photo.id,
          key: photo.path || photo.url || photo.data || photo.name || '',
          path: photo.path || '',
          url: photo.url || '',
          name: photo.name || '',
          deletedAt: new Date().toISOString(),
          deletedBy: state.user?.name || 'Sistema'
        }]);
      }

      function setUser(user) {
        state.user = user;
        localStorage.setItem('mg_user', JSON.stringify(user));
        render();
      }

      function scopedJobs() {
        if (!state.user) return [];
        if (state.user.role === 'admin') return sortJobsNewestFirst(state.data.jobs);
        if (state.user.role === 'client') return sortJobsNewestFirst(state.data.jobs.filter((job) => job.clientId === state.user.clientId));

        const vehicle = reportVehicleForUser(state.user);
        return sortJobsNewestFirst(state.data.jobs.filter((job) => (
          job.technicianId === state.user.id
          || (vehicle && job.vehicle === vehicle)
        )));
      }

      function sortJobsNewestFirst(jobs = []) {
        return [...(jobs || [])].sort((a, b) => jobSortTime(b) - jobSortTime(a));
      }

      function jobSortTime(job) {
        const candidates = [job?.updatedAt, job?.createdAt, job?.closedAt, job?.date]
          .filter(Boolean)
          .map((value) => Date.parse(value))
          .filter((value) => !Number.isNaN(value));
        if (candidates.length) return Math.max(...candidates);
        return Number(job?.id || 0) || 0;
      }

      function scopedInventory() {
        if (state.user.role === 'admin') return state.data.inventory;
        return state.data.inventory.filter((item) => item.vehicle === state.user.vehicle);
      }

      function scopedMovements() {
        if (state.user.role === 'admin') return state.data.movements || [];
        return (state.data.movements || []).filter((move) => String(move.technician || '') === String(state.user.name || ''));
      }

      function scopedAuditLogs() {
        if (state.user.role === 'admin') return state.data.auditLogs || [];
        return (state.data.auditLogs || []).filter((item) => String(item.user || '') === String(state.user.name || ''));
      }

      function inventoryForVehicle(vehicle) {
        return (state.data.inventory || []).filter((item) => item && item.vehicle === vehicle);
      }

      function reportVehicleForUser(user) {
        return user?.vehicle || state.data.vehicles.find((vehicle) => (
          vehicle.technicianId === user?.id || (vehicle.technicianIds || []).includes(user?.id)
        ))?.code || '';
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat('es-CR', { style: 'currency', currency: 'USD' }).format(value || 0);
      }

      function technicians() {
        return appUsers().filter((user) => user.role === 'technician' && user.active !== false);
      }

      function statuses() {
        return ['Pendiente', 'Asignado', 'En camino', 'Trabajando', 'En taller', 'Esperando repuesto', 'Pausado', 'Garantia', 'Finalizado', 'Cancelado'];
      }

      function technicianStatuses() {
        return ['Pendiente', 'Asignado', 'En camino', 'Trabajando', 'En taller', 'Esperando repuesto', 'Pausado', 'Garantia', 'Finalizado'];
      }

      function finalStatuses() {
        return ['Finalizado', 'Completado', 'Cerrado'];
      }

      function isJobLocked(job) {
        return job.signed || finalStatuses().includes(job.status);
      }

      function canEditJob(job) {
        if (!state.user || !job) return false;
        if (state.user.role === 'admin') return true;
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        return state.user.role === 'technician'
          && job.technicianId === state.user.id
          && new Date(job.date) >= sevenDaysAgo
          && !isJobLocked(job);
      }

      function priorities() {
        return ['Baja', 'Media', 'Alta', 'Urgente'];
      }

      function warrantyOptions() {
        return ['Pendiente', 'Activa', 'Sin garantia', 'Vencida'];
      }

      function visibleNotifications() {
        return state.data.notifications.filter((notification) => {
          if (notification.role === 'admin') return state.user.role === 'admin';
          if (notification.role === 'technician') return state.user.role === 'technician' && notification.technicianId === state.user.id;
          return notification.role === state.user.role;
        });
      }

      function warrantyStatus(endDate) {
        const todayDate = new Date(today(0));
        const end = new Date(endDate);
        const daysLeft = Math.ceil((end - todayDate) / 86400000);
        if (daysLeft < 0) return 'Vencida';
        if (daysLeft <= 30) return 'Proxima a vencer';
        return 'Activa';
      }

      function updateWarrantyStatuses() {
        state.data.warranties.forEach((warranty) => {
          warranty.status = warrantyStatus(warranty.end);
          if (warranty.status === 'Proxima a vencer') {
            addUniqueNotification('admin', `Garantia proxima a vencer: ${warranty.ticket}  -  ${warranty.client}`, 'Garantia');
          }
        });
      }

      function updateMaintenanceNotifications() {
        state.data.maintenances.forEach((item) => {
          const daysLeft = Math.ceil((new Date(item.nextDate) - new Date(today(0))) / 86400000);
          if (item.status === 'Pendiente' && daysLeft <= 7) {
            addUniqueNotification('admin', `Mantenimiento pendiente: ${item.client}  -  ${item.nextDate}`, 'Mantenimiento');
          }
        });
      }

      function updateAppointmentNotifications() {
        (state.data.appointments || []).forEach((item) => {
          const daysLeft = Math.ceil((new Date(item.date) - new Date(today(0))) / 86400000);
          if (item.status !== 'Completada' && daysLeft >= 0 && daysLeft <= 2) {
            addUniqueNotification('admin', `Cita proxima: ${item.client}  -  ${item.date} ${item.hour}`, 'Cita');
          }
        });
      }

      function addUniqueNotification(role, text, type, technicianId = null) {
        const exists = state.data.notifications.some((notification) => notification.role === role && notification.text === text && notification.technicianId === technicianId);
        if (!exists) {
          state.data.notifications.unshift({ id: Date.now() + Math.random(), role, technicianId, text, type });
        }
      }

      function logAudit(action, entity, beforeValue = null, afterValue = null) {
        state.data.auditLogs ||= [];
        state.data.auditLogs.unshift({
          id: Date.now() + Math.random(),
          user: state.user?.name || 'Sistema',
          role: state.user?.role || 'system',
          action,
          entity,
          before: beforeValue ? JSON.stringify(beforeValue).slice(0, 240) : '',
          after: afterValue ? JSON.stringify(afterValue).slice(0, 240) : '',
          date: new Date().toISOString()
        });
      }

      function logFieldChanges(entity, beforeValue, afterValue, fields) {
        fields.forEach((field) => {
          const beforeField = beforeValue?.[field] ?? '';
          const afterField = afterValue?.[field] ?? '';
          if (String(beforeField) === String(afterField)) return;
          logAudit(`Modificar ${field}`, entity, { [field]: beforeField }, { [field]: afterField });
        });
      }

      function jobPhotosMarkup(job, options = {}) {
        const { allowDelete = false, limit = 4 } = options;
        const beforePhotos = Array.isArray(job.photos?.before) ? job.photos.before : [];
        const afterPhotos = Array.isArray(job.photos?.after) ? job.photos.after : [];
        const photos = [
          ...beforePhotos.map((photo) => ({ photo, listKind: 'before' })),
          ...afterPhotos.map((photo) => ({ photo, listKind: 'after' }))
        ].filter(({ photo }) => photoUrl(photo) || hasLocalPendingPhoto(photo));
        const visiblePhotos = limit ? photos.slice(0, limit) : photos;
        if (!visiblePhotos.length) return '<span class="pill">Sin fotos</span>';
        return `<div class="photo-strip">${visiblePhotos.map(({ photo, listKind }) => {
          const url = photoUrl(photo);
          const removeButton = allowDelete && state.user?.role === 'admin' && photo.id
            ? `<button type="button" class="btn danger" style="padding:6px 8px; font-size:12px;" onclick="deleteJobPhoto(${jsArg(job.id)}, ${jsArg(listKind)}, ${jsArg(photo.id)})">Eliminar</button>`
            : '';
          return url
            ? `<span style="display:inline-grid; gap:4px;"><a href="${url}" target="_blank" rel="noopener"><img src="${url}" alt="${photo.kind || 'Foto reporte'}" /><small>Abrir foto</small></a>${removeButton}</span>`
            : `<span style="display:inline-grid; gap:4px;"><span class="pill">Pendiente de sincronizar</span>${removeButton}</span>`;
        }).join('')}</div>`;
      }

      function photoUrl(photo) {
        return photo?.url || photo?.data || '';
      }

      function hasLocalPendingPhoto(photo) {
        return Boolean(photo?.data && !photo?.url);
      }

      function brokenPhotoCount(job) {
        return [...(job.photos?.before || []), ...(job.photos?.after || [])]
          .filter((photo) => photo && !photo.url && !photo.data).length;
      }

      function localPendingPhotoCount(job) {
        return [...(job.photos?.before || []), ...(job.photos?.after || [])]
          .filter((photo) => hasLocalPendingPhoto(photo)).length;
      }

      function pendingPhotoJobs() {
        return scopedJobs()
          .map((job) => ({
            job,
            pending: localPendingPhotoCount(job),
            broken: brokenPhotoCount(job)
          }))
          .filter((item) => item.pending || item.broken);
      }

      function printJob(id) {
        const job = state.data.jobs.find((item) => String(item.id) === String(id));
        if (!job) return alert('Reporte no encontrado.');
        const fileName = pdfFileName(job);
        const printWindow = window.open('', '_blank');
        if (!printWindow) return alert('Permita ventanas emergentes para generar el PDF.');
        printWindow.document.write(`
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>${fileName}</title>
              <style>
                body { margin: 0; padding: 24px; color: #172033; font-family: Arial, sans-serif; background: #fff; }
                .pdf-preview { max-width: 920px; margin: 0 auto; }
                h2, h3 { color: #0f2a44; margin: 0 0 8px; }
                .pdf-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
                .pdf-box { border: 1px solid #d9e2ec; border-radius: 8px; padding: 10px; background: #fbfdff; }

      function filterInventoryItems(items, query) {
        const text = String(query || '').trim().toLowerCase();
        if (!text) return items;
        return items.filter((item) => [
          item.vehicle,
          item.part,
          item.qty <= item.min ? 'stock bajo' : 'disponible'
        ].some((value) => String(value || '').toLowerCase().includes(text)));
      }

      function printLowStockPdf() {
        const items = scopedInventory().filter((item) => item.qty <= item.min);

        const rows = items.map((item) => `
          <tr>
            <td>${escapeText(item.vehicle)}</td>
            <td>${escapeText(item.part)}</td>
            <td>${item.qty}</td>
            <td>${item.min}</td>
            <td>${Math.max(1, Number(item.min || 0) - Number(item.qty || 0))}</td>
          </tr>
        `).join('');
        const printWindow = window.open('', '_blank');
        if (!printWindow) return alert('Permita ventanas emergentes para generar el PDF.');
        printWindow.document.write(`

      function escapeText(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[char]));
      }

      function formValue(value) {
        return escapeText(value ?? '');
      }

      function jsArg(value) {
        return escapeText(JSON.stringify(String(value ?? '')));
      }

      function technicianForJob(job) {
        return technicians().find((tech) => String(tech.id) === String(job.technicianId))
          || technicians().find((tech) => String(tech.name || '').toLowerCase() === String(job.technician || '').toLowerCase())
          || { id: job.technicianId || '', name: job.technician || 'Sin tecnico', vehicle: job.vehicle || '' };
      }

      function formatMultiline(value, fallback = '') {
        const text = String(value || '').trim();
        if (!text) return escapeText(fallback);
        return escapeText(text).replace(/\r?\n/g, '<br>');
      }

        if (days < 0) return 'Garantia vencida';
        if (days === 0) return 'Vence hoy';
        return `${days} dias restantes`;
      }

      function warrantyCalendar(dateText) {
        if (!dateText) return 'Sin fecha';
        const date = new Date(dateText);
        const month = date.toLocaleDateString('es-CR', { month: 'short' });
        const day = date.getDate();
        return `<div class="mini-calendar"><div class="month">${month}</div><div class="day">${day}</div><small>${dateText}</small></div>`;
      }

        const matches = clientCandidates.filter((client) => normalizeClientSearch([
          client.name,

      }

      function clientSearchCandidates() {
        const candidates = new Map();
        (state.data.clients || []).forEach((client) => {
          candidates.set(String(client.id || normalizeClientSearch(client.name)), { ...client });
        });
        (state.data.jobs || []).forEach((job) => {
          const key = String(job.clientId || normalizeClientSearch(job.client));
          const current = candidates.get(key) || {};
          candidates.set(key, {
            id: job.clientId || `history-${normalizeClientSearch(job.client)}`,
            name: current.name || job.client || '',
            phone: current.phone || job.phone || '',
            email: current.email || job.email || '',
            address: current.address || job.address || '',
            fromHistory: !current.name
          });
        });
        return Array.from(candidates.values()).filter((client) => client.name);
      }

      async function createReport(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        const id = Date.now();
        const ticket = form.get('ticket');
        if (state.data.jobs.some((job) => String(job.ticket).toLowerCase() === String(ticket).toLowerCase())) {
          alert('Ya existe un reporte con ese numero de boleta.');
          return;
        }
        const client = findOrCreateClient({
          name: form.get('client'),
          phone: form.get('phone'),
          email: form.get('email'),
          address: form.get('address')
        });
        const assignedTech = state.user.role === 'admin'
          ? technicians().find((tech) => String(tech.id) === String(form.get('technicianId'))) || technicians()[0]
          : state.user;
        const usedParts = selectedReportParts(form);
        const additionalMaterials = String(form.get('materials') || '').trim();
        const warrantyEnd = calculateWarrantyEnd(form.get('warrantyDuration'), form.get('warrantyUnit'), form.get('warrantyEnd'));
        const materials = [
          ...usedParts.map((part) => `${part.part} x${part.quantity}`),
          additionalMaterials
        ].filter(Boolean).join(', ');
        const photos = await collectReportPhotos(event.target, id);
        const motorBrands = collectMotorBrands(event.target);
        const newJob = {
          id,
          ticket,
          clientId: client.id,
          client: client.name,
          technicianId: assignedTech.id,
          technician: assignedTech.name,
          vehicle: reportVehicleForUser(assignedTech) || 'MOV-01',
          status: form.get('status'),
          priority: form.get('priority') || 'Media',
          date: today(0),
          address: form.get('address'),
          phone: form.get('phone'),
          email: form.get('email'),
          description: form.get('description'),
          notes: form.get('notes'),
          photos,
          time: form.get('time') || workedTimeLabel(form.get('arrival'), form.get('departure')),
          motorCount: Number(form.get('motorCount') || motorBrands.length || 0),
          motorBrands,
          workshopEntry: collectWorkshopEntry(event.target),
          materials,
          warranty: warrantyLabel(form.get('warranty'), warrantyEnd),
          warrantyEnd,
          signed: finalStatuses().includes(form.get('status')),
          closedAt: finalStatuses().includes(form.get('status')) ? new Date().toISOString() : '',
          pdfStatus: finalStatuses().includes(form.get('status')) ? 'Generado' : 'Pendiente',
          updatedAt: new Date().toISOString(),
          gps: '',
          arrival: form.get('arrival') || new Date().toTimeString().slice(0, 5),
          departure: form.get('departure') || ''
        };

        state.data.jobs.unshift(newJob);
        consumeSelectedParts(usedParts, newJob);
        consumeMaterials(additionalMaterials, newJob.vehicle, newJob);
        createWarrantyFromReport(newJob, warrantyEnd);
        notifyAssignment(newJob);
        state.data.syncQueue.push({ id, type: 'report', createdAt: new Date().toISOString() });
        logAudit('Crear reporte', 'Reporte', null, newJob);
        save();
        localStorage.removeItem(`mg_report_draft_${state.user?.id || 'guest'}`);
        state.reportFormOpen = false;
        render();
        alert('Reporte guardado localmente. La sincronizacion con Supabase inicio automaticamente.');
      }

      function warrantyLabel(status, endDate) {
        if (status === 'Sin garantia') return status;
        return endDate ? `${status} hasta ${endDate}` : status;
      }

      function calculateWarrantyEnd(duration, unit, fallbackDate) {
        const amount = Number(duration);
        if (Number.isNaN(amount) || amount <= 0) return fallbackDate || '';
        const date = new Date(today(0));
        if (unit === 'days') date.setDate(date.getDate() + amount);
        if (unit === 'weeks') date.setDate(date.getDate() + amount * 7);
        if (unit === 'months') date.setMonth(date.getMonth() + amount);
        return date.toISOString().slice(0, 10);
      }

      function updateWarrantyEnd() {
        const duration = document.querySelector('input[name="warrantyDuration"]')?.value;
        const unit = document.querySelector('select[name="warrantyUnit"]')?.value;
        const target = document.querySelector('input[name="warrantyEnd"]');
        if (target) target.value = calculateWarrantyEnd(duration, unit, target.value);
        persistReportDraftFromDom();
      }

      function updateWorkedTime() {
        const arrival = document.querySelector('input[name="arrival"]')?.value;
        const departure = document.querySelector('input[name="departure"]')?.value;
        const target = document.querySelector('input[name="time"]');
        if (target) target.value = workedTimeLabel(arrival, departure);
        persistReportDraftFromDom();
      }

      function workedTimeLabel(arrival, departure) {
        const minutes = workedMinutes(arrival, departure);
        if (!minutes) return '';
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return `${hours ? `${hours}h ` : ''}${rest}m`.trim();
      }

      function workedMinutes(arrival, departure) {
        if (!arrival || !departure) return 0;
        const [arrivalHour, arrivalMinute] = String(arrival).split(':').map(Number);
        const [departureHour, departureMinute] = String(departure).split(':').map(Number);
        if ([arrivalHour, arrivalMinute, departureHour, departureMinute].some(Number.isNaN)) return 0;
        const start = arrivalHour * 60 + arrivalMinute;
        let end = departureHour * 60 + departureMinute;
        if (end < start) end += 24 * 60;
        return Math.max(0, end - start);
      }

        if (!total) return '<div class="list-item"><strong>Motores</strong><br>Sin marcas de motor para este reporte.</div>';

      function workshopFieldsMarkup(entry = {}, visible = false) {

        const equipment = ['Motor', 'Tarjeta', 'Receptor', 'Control', 'Sensor', 'Otro'];
        const conditions = ['No enciende', 'Falla intermitente', 'Quemado', 'Mojado', 'Golpeado', 'Requiere diagnostico', 'Otro'];

        return `

      async function readPhotoInput(input, kind, jobId) {
        const files = Array.from(input?.files || []);
        const tasks = files.map((file) => async () => {
          try {
            return await preparePhoto(file, kind, jobId);
          } catch (error) {
            console.error(error);
            alert(`No se pudo cargar la foto ${file.name}. Intente con otra imagen.`);
            return null;
          }
        });
        return (await runConcurrentTasks(tasks, 2)).filter(Boolean);
      }

      async function preparePhoto(file, kind, jobId) {
        const data = file.type.startsWith('image/') ? await compressImage(file, 420, 0.24) : await readFileAsDataUrl(file);
        return {
          id: Date.now() + Math.random(),
          kind,
          name: file.name,
          data,
          size: data.length
        };
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function compressImage(file, maxSide = 420, quality = 0.24) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const image = new Image();
            image.onload = () => {
              const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
              const canvas = document.createElement('canvas');
              canvas.width = Math.max(1, Math.round(image.width * scale));
              canvas.height = Math.max(1, Math.round(image.height * scale));
              const ctx = canvas.getContext('2d');
              ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', quality));
            };
            image.onerror = () => resolve(reader.result);
            image.src = reader.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function recompressPhotoData(photo) {
        if (!photo?.data || !String(photo.data).startsWith('data:image/')) return Promise.resolve(photo);
        return new Promise((resolve) => {
          const image = new Image();
          image.onload = () => {
            const maxSide = 420;
            const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            const ctx = canvas.getContext('2d');
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            const data = canvas.toDataURL('image/jpeg', 0.24);
            resolve({ ...photo, data, size: data.length, recompressed: true });
          };
          image.onerror = () => resolve(photo);
          image.src = photo.data;
        });
      }

      function dataUrlToBlob(dataUrl) {
        const [header, body] = String(dataUrl).split(',');
        const mime = header.match(/data:(.*?);base64/)?.[1] || 'image/jpeg';
        const binary = atob(body || '');
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
        return new Blob([bytes], { type: mime });
      }

      function safeFileName(name) {
        return String(name || 'foto.jpg').replace(/[^a-z0-9._-]+/gi, '-').replace(/-+/g, '-');
      }

      async function uploadPhotoToStorage(photo, jobId) {
        const config = supabaseConfig();
        if (!config.ready || !navigator.onLine || !photo?.data || photo.url) return photo;
        const bucket = 'mg-report-photos';
        const path = `reports/${jobId || 'pendiente'}/${photo.id}-${safeFileName(photo.name)}`;
        const blob = dataUrlToBlob(photo.data);
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 45000);
        const response = await fetch(`${config.url}/storage/v1/object/${bucket}/${path}`, {
          method: 'POST',
          signal: controller.signal,
          headers: {
            apikey: config.anonKey,
            Authorization: `Bearer ${config.anonKey}`,
            'Content-Type': blob.type || 'image/jpeg',
            'x-upsert': 'true'
          },
          body: blob
        }).finally(() => window.clearTimeout(timeout));
        if (!response.ok) throw new Error(await response.text());
        return {
          ...photo,
          data: '',
          pendingUpload: false,
          path,
          url: `${config.url}/storage/v1/object/public/${bucket}/${path}`
        };
      }

      async function uploadPendingPhotos() {
        if (!supabaseConfig().ready || !navigator.onLine) return;
        const tasks = [];
        for (const job of state.data.jobs || []) {
          job.photos ||= { before: [], after: [] };
          for (const kind of ['before', 'after']) {
            (job.photos?.[kind] || []).forEach((photo, index) => {
              if (photo?.data && !photo.url) tasks.push(() => uploadPendingPhotoAt(job, kind, index));
            });
          }
        }
        await runConcurrentTasks(tasks, 3);
      }

      async function uploadPendingPhotosForJob(job) {
        if (!supabaseConfig().ready || !navigator.onLine || !job) return;
        job.photos ||= { before: [], after: [] };
        const tasks = [];
        for (const kind of ['before', 'after']) {
          const photos = job.photos?.[kind] || [];
          for (let index = 0; index < photos.length; index += 1) {
            const photo = photos[index];
            if (photo?.data && !photo.url) tasks.push(() => uploadPendingPhotoAt(job, kind, index));
          }
        }
        await runConcurrentTasks(tasks, 3);
      }

      async function uploadPendingPhotoAt(job, kind, index) {
        const photos = job.photos?.[kind] || [];
        const photo = photos[index];
        if (!photo?.data || photo.url) return photo;
        const uploadKey = `${job.id}:${kind}:${photo.id || index}`;
        if (activePhotoUploads.has(uploadKey)) return activePhotoUploads.get(uploadKey);
        const uploadTask = (async () => {
          try {
            const compressedPhoto = photo.recompressed ? photo : await recompressPhotoData(photo);
            photos[index] = await uploadPhotoToStorage(compressedPhoto, job.id);
            return photos[index];
          } catch (error) {
            console.error(error);
            return photo;
          } finally {
            activePhotoUploads.delete(uploadKey);
          }
        })();
        activePhotoUploads.set(uploadKey, uploadTask);
        return uploadTask;
      }

      async function runConcurrentTasks(tasks, limit = 3) {
        if (!tasks.length) return [];
        const results = new Array(tasks.length);
        let nextIndex = 0;
        const workers = Array.from({ length: Math.min(limit, tasks.length) }, async () => {
          while (nextIndex < tasks.length) {
            const index = nextIndex;
            nextIndex += 1;
            results[index] = await tasks[index]();
          }
        });
        await Promise.all(workers);
        return results;
      }

      function consumeSelectedParts(parts, job) {
        parts.forEach((part) => {
          const item = state.data.inventory.find((inventoryItem) => inventoryItem.id === part.id);
          if (!item) return;
          consumeInventoryItem(item, part.quantity, job, 'Consumo reporte');
        });

      function consumeMaterials(materials, vehicle, job) {
        if (!materials) return;
        const lines = materials.split(/,|\n/).map((line) => line.trim()).filter(Boolean);

        lines.forEach((line) => {
          const quantityMatch = line.match(/x\s*(\d+)|(\d+)\s*$/i);
          const quantity = Number(quantityMatch?.[1] || quantityMatch?.[2] || 1);
          const normalizedLine = line.toLowerCase().replace(/x\s*\d+|\d+$/i, '').trim();
          const item = state.data.inventory.find((part) => part.vehicle === vehicle && normalizedLine.includes(part.part.toLowerCase().slice(0, 10)));

          if (!item) return;

          consumeInventoryItem(item, quantity, job, 'Consumo reporte');
        });
      }

      function consumeInventoryItem(item, quantity, job, action) {
        const before = item.qty;
        const used = Math.min(quantity, item.qty);
        item.qty = Math.max(0, item.qty - used);
        state.data.movements.unshift({
          id: Date.now() + Math.random(),
          vehicle: item.vehicle,
          material: item.part,
          quantity: used,
          before,
          after: item.qty,
          action,
          technician: job.technician,
          ticket: job.ticket,
          date: today(0)
        });

        state.data.notifications.unshift({
          id: Date.now() + Math.random(),
          role: 'admin',
          text: `Reponer ${item.part} en ${item.vehicle}. ${job.technician} uso ${used} en la boleta ${job.ticket}. Quedan ${item.qty}.`,
          type: 'Reposicion'
        });

        if (item.qty <= item.min) {
          addUniqueNotification('admin', `Inventario bajo en ${item.vehicle}: ${item.part}`, 'Inventario');
        }
      }

      function temporaryPassword() {
        const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
        const values = new Uint32Array(10);
        if (window.crypto?.getRandomValues) {
          window.crypto.getRandomValues(values);
        } else {
          values.forEach((_, index) => { values[index] = Math.floor(Math.random() * alphabet.length); });
        }
        return Array.from(values, (value) => alphabet[value % alphabet.length]).join('');
      }

      function submitInventoryTransfer(event, id) {
        event.preventDefault();
        const item = state.data.inventory.find((part) => part.id === id);
        if (!item) return;
        const form = new FormData(event.target);
        const toVehicle = form.get('toVehicle');
        const qty = Number(form.get('qty'));
        if (!toVehicle || Number.isNaN(qty) || qty <= 0 || qty > item.qty) return;
        const before = item.qty;
        item.qty -= qty;
        let target = state.data.inventory.find((part) => part.vehicle === toVehicle && part.part === item.part);
        if (!target) {
          target = { id: `inv-${Date.now()}-${toVehicle}`, vehicle: toVehicle, part: item.part, qty: 0, min: item.min };
          state.data.inventory.push(target);
        }
        const targetBefore = target.qty;
        target.qty += qty;
        state.data.movements.unshift({ id: Date.now(), vehicle: item.vehicle, material: item.part, quantity: qty, before, after: item.qty, action: `Transferencia a ${toVehicle}`, technician: state.user.name, date: today(0) });
        state.data.movements.unshift({ id: Date.now() + 1, vehicle: toVehicle, material: item.part, quantity: qty, before: targetBefore, after: target.qty, action: `Transferencia desde ${item.vehicle}`, technician: state.user.name, date: today(0) });
        logAudit('Transferir inventario', 'Inventario', { from: item.vehicle, qty: before, to: targetBefore }, { from: item.qty, to: target.qty, part: item.part });
        state.modal = null;
        save();
        render();
      }

      function downloadBackup() {
        if (state.user.role !== 'admin') return alert('Solo administracion puede descargar respaldos.');
        const data = backupSafeData(state.data);
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        const backup = {
          app: 'MG Portones',
          version: 'v47',
          createdAt: new Date().toISOString(),
          createdBy: state.user.name,
          counts: {
            jobs: (data.jobs || []).length,
            clients: (data.clients || []).length,
            users: (data.users || []).length,
            inventory: (data.inventory || []).length,
            photosPending: countPendingPhotoUploads(state.data)
          },
          data
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `respaldo-mg-portones-${stamp}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        logAudit('Descargar respaldo', 'Sistema', null, backup.counts);
        save();
      }

            alert(pendingPhotos ? `Datos sincronizados. Todavia faltan ${pendingPhotos} foto(s). ${summary ? 'Boletas: ' + summary : 'Toca Sincronizar otra vez.'}` : 'Sincronizacion con Supabase completada.');
          })
          .catch(() => {
            cloudReady = false;
            cloudError = 'No se pudo sincronizar. Revisa conexion y vuelve a tocar Sincronizar.';
            saveLocalData();
            render();
            alert('No se pudo sincronizar con Supabase. Los reportes siguen guardados en este dispositivo.');
          });
      }

      function syncPendingWhenOnline() {
        const hasPendingData = (state.data.syncQueue || []).length || countPendingPhotoUploads(state.data);
        if (!navigator.onLine || !hasPendingData) {
          render();
          return;
        }
        syncCloudInBackground();
      }

      function renderSearch() {
        const text = document.getElementById('searchText').value.toLowerCase();
        const status = document.getElementById('searchStatus').value;
        const date = document.getElementById('searchDate').value;
        const warranty = document.getElementById('searchWarranty')?.value || '';
        const vehicle = document.getElementById('searchVehicle').value.toLowerCase();
        const results = state.data.jobs.filter((job) => {
          const matchesText = [job.ticket, job.client, job.technician, job.vehicle, job.description, job.materials].join(' ').toLowerCase().includes(text);
          const matchesStatus = !status || job.status === status;
          const matchesDate = !date || job.date === date;
          const matchesWarranty = !warranty || String(job.warranty || '').includes(warranty);
          const matchesVehicle = !vehicle || String(job.vehicle).toLowerCase().includes(vehicle);
          return matchesText && matchesStatus && matchesDate && matchesWarranty && matchesVehicle;
        });
        document.getElementById('searchResults').innerHTML = jobsTable(results);
      }

      function filterReports() {
        const text = document.getElementById('reportFilterText')?.value.toLowerCase() || '';
        const date = document.getElementById('reportFilterDate')?.value || '';
        const status = document.getElementById('reportFilterStatus')?.value || '';
        const results = scopedJobs().filter((job) => {
          const haystack = [job.client, job.ticket, job.technician, job.vehicle, job.status].join(' ').toLowerCase();
          return haystack.includes(text) && (!date || job.date === date) && (!status || job.status === status);
        });
        document.getElementById('reportResults').innerHTML = jobsTable(results, true);
      }

      window.addEventListener('online', syncPendingWhenOnline);
      window.addEventListener('offline', render);
      window.setInterval(() => {
        const hasPendingData = (state.data.syncQueue || []).length || countPendingPhotoUploads(state.data);
        if (navigator.onLine && hasPendingData) syncCloudInBackground();
      }, 30000);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }

      async function initializeApp() {
        clearReportDrafts();
        await loadCloudData();
        normalizeData();
        render();
      }

      initializeApp();
    </script>
  </body>
</html>
